<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>시리얼 관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root {
  --bg: #eef2f6; --primary: #1a5a7a; --primary-dk: #0f3d55;
  --green: #27ae6e; --surface: #ffffff; --border: #c0d4e4;
  --text: #0d2d3f; --muted: #7a9aaa; --card: #dde8f0;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; width:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; overflow:hidden; position:fixed; }
.app { display:flex; flex-direction:column; height:100%; padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
.pages { flex:1; overflow:hidden; position:relative; }
.page { position:absolute; inset:0; overflow-y:auto; display:none; flex-direction:column; }
.page.active { display:flex; }
.bottom-nav { background:var(--primary-dk); display:flex; flex-shrink:0; border-top:2px solid var(--primary); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:12px 0; background:none; border:none; color:rgba(255,255,255,0.4); font-size:11px; font-weight:700; cursor:pointer; }
.nav-btn.active { color:#fff; border-top: 3px solid #fff; }
.main-scroll { flex:1; padding:14px; display:flex; flex-direction:column; gap:12px; }
.top-row { display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:12px; padding:10px 14px; border:1px solid var(--border); }
.datetime-lbl { font-size:12px; color:var(--muted); }
.manager-input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px; font-size:14px; outline:none; }
.section-card { background:var(--surface); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.section-header { display:flex; height:44px; }
.section-label-box { background:var(--primary-dk); color:#fff; width:70px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
.scan-btn { flex:1; background:var(--primary); border:none; color:#fff; font-weight:700; cursor:pointer; }
.scanned-row { display:flex; align-items:center; gap:8px; padding:10px 14px; border-top:1px solid var(--border); }
.scanned-dot { width:8px; height:8px; border-radius:50%; background:#ccc; }
.scanned-row.active .scanned-dot { background:var(--primary); box-shadow:0 0 5px var(--primary); }
.number-row { display:flex; border-top:1px solid var(--border); }
.number-lbl { background:var(--card); width:70px; padding:12px 0; text-align:center; font-size:13px; font-weight:700; border-right:1px solid var(--border); }
.number-input { flex:1; border:none; padding:10px 14px; font-size:14px; outline:none; }
.ratio-card { background:var(--surface); border-radius:12px; border:1px solid var(--border); padding:16px; }
.prog-bar-track { display:flex; height:40px; border-radius:20px; overflow:hidden; background:#eee; }
.prog-bar-subject { background: linear-gradient(90deg, #0f3d55, #1a5a7a); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:700; transition:0.3s; }
.prog-bar-hardener { background: linear-gradient(90deg, #1e8a58, #27ae6e); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:700; transition:0.3s; }
.range-s, .range-h { -webkit-appearance:none; width:100%; height:12px; border-radius:6px; margin:15px 0; background:#dde8f0; outline:none; }
.range-s::-webkit-slider-thumb { -webkit-appearance:none; width:28px; height:28px; border-radius:50%; background:var(--primary); border:3px solid #fff; }
.range-h::-webkit-slider-thumb { -webkit-appearance:none; width:28px; height:28px; border-radius:50%; background:var(--green); border:3px solid #fff; }
.submit-btn { width:100%; padding:16px; background:var(--primary-dk); color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:700; }
.cam-modal { position:fixed; inset:0; background:#000; z-index:1000; display:flex; flex-direction:column; }
.cam-modal.hidden { display:none; }
#interactive { flex:1; position:relative; }
#interactive video { width:100%; height:100%; object-fit:cover; }
.list-card { background:#fff; border-radius:10px; padding:12px; margin-bottom:10px; border:1px solid var(--border); }
.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000; pointer-events:none; }
.toast.show { opacity:1; }
</style>
</head>
<body>
<div class="app">
  <div class="pages">
    <div class="page active" id="page-main">
      <div class="main-scroll">
        <div class="top-row">
          <div class="datetime-lbl" id="clockEl">--.--.--</div>
          <input class="manager-input" id="managerInput" type="text" placeholder="담당자 성함">
        </div>
        <div class="section-card">
          <div class="section-header"><div class="section-label-box">주제</div><button class="scan-btn" onclick="openCam('subject')">바코드 스캔</button></div>
          <div class="scanned-row" id="subjectRow"><div class="scanned-dot"></div><div class="scanned-code">시리얼 스캔 전</div></div>
          <div class="number-row"><div class="number-lbl">넘버</div><input class="number-input" id="subjectNum" type="text" placeholder="넘버 직접 입력 가능"></div>
        </div>
        <div class="section-card">
          <div class="section-header"><div class="section-label-box">경화제</div><button class="scan-btn" onclick="openCam('hardener')">바코드 스캔</button></div>
          <div class="scanned-row" id="hardenerRow"><div class="scanned-dot"></div><div class="scanned-code">시리얼 스캔 전</div></div>
          <div class="number-row"><div class="number-lbl">넘버</div><input class="number-input" id="hardenerNum" type="text" placeholder="넘버 직접 입력 가능"></div>
        </div>
        <div class="ratio-card">
          <div class="prog-bar-track">
            <div class="prog-bar-subject" id="barSubject" style="width:50%"><span id="barSubjectTxt">주제 50%</span></div>
            <div class="prog-bar-hardener" id="barHardener" style="width:50%"><span id="barHardenerTxt">경화제 50%</span></div>
          </div>
          <input class="range-s" id="sliderSubject" type="range" min="0" max="100" value="50" oninput="syncRatio('subject', this.value)">
          <input class="range-h" id="sliderHardener" type="range" min="0" max="100" value="50" oninput="syncRatio('hardener', this.value)">
        </div>
        <button class="submit-btn" onclick="submitEntry()">데이터 입력 등록</button>
      </div>
    </div>
    <div class="page" id="page-list">
      <div style="padding:12px; background:var(--primary-dk); display:flex; gap:8px;">
        <input style="flex:1; padding:10px; border-radius:8px; border:none;" id="searchBox" type="text" placeholder="검색..." oninput="renderList()">
        <button style="background:none; border:1px solid #fff; color:#fff; padding:0 10px; border-radius:8px;" onclick="clearAll()">삭제</button>
      </div>
      <div id="listBody" style="flex:1; padding:14px; overflow-y:auto;"></div>
      <div style="padding:12px; display:flex; gap:8px; background:var(--primary-dk);">
        <button style="flex:1; padding:12px; border:none; border-radius:8px; background:var(--primary); color:#fff; font-weight:700;" onclick="sendEmail()">CSV 메일발송</button>
        <button style="flex:1; padding:12px; border:none; border-radius:8px; background:rgba(255,255,255,0.1); color:#fff;" onclick="syncAll()">시트 동기화</button>
      </div>
    </div>
  </div>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="goTab('main', this)">입력창</button>
    <button class="nav-btn" onclick="goTab('list', this)">조회 목록</button>
  </nav>
</div>
<div class="cam-modal hidden" id="camModal">
  <div style="padding:15px; display:flex; justify-content:space-between; color:#fff; background:rgba(0,0,0,0.8);"><span id="camTitle">바코드 스캔</span><button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:18px;">닫기</button></div>
  <div id="interactive"></div>
</div>
<div class="toast" id="toast"></div>

<script>
let entries = JSON.parse(localStorage.getItem('sr_entries') || '[]');
let subjectSerial = '', hardenerSerial = '', camTarget = '';

document.addEventListener('DOMContentLoaded', () => {
    updateClock(); setInterval(updateClock, 10000);
    syncRatio('subject', 50); renderList();
});

function updateClock() {
    const n = new Date();
    document.getElementById('clockEl').textContent = `${n.getFullYear()}.${n.getMonth()+1}.${n.getDate()} ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
}

function syncRatio(from, val) {
    const s = from === 'subject' ? parseInt(val) : 100 - parseInt(val);
    const h = 100 - s;
    document.getElementById('sliderSubject').value = s;
    document.getElementById('sliderHardener').value = h;
    document.getElementById('barSubject').style.width = s + '%';
    document.getElementById('barHardener').style.width = h + '%';
    document.getElementById('barSubjectTxt').textContent = s > 15 ? `주제 ${s}%` : `${s}%`;
    document.getElementById('barHardenerTxt').textContent = h > 15 ? `경화제 ${h}%` : `${h}%`;
}

function goTab(tab, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    btn.classList.add('active');
    if(tab === 'list') renderList();
}

function openCam(target) {
    camTarget = target;
    document.getElementById('camModal').classList.remove('hidden');
    // 인식률 개선을 위한 설정 강화
    Quagga.init({
        inputStream: { 
            name: "Live", type: "LiveStream", target: document.querySelector('#interactive'),
            constraints: { width: 1280, height: 720, facingMode: "environment", focusMode: "continuous" }
        },
        decoder: { readers: ["code_128_reader", "ean_reader"], multiple: false },
        locate: true
    }, (err) => {
        if (err) return showToast("카메라 에러");
        Quagga.start();
    });
}

Quagga.onDetected((res) => {
    const code = res.codeResult.code;
    if(camTarget === 'subject') {
        subjectSerial = code;
        document.getElementById('subjectRow').classList.add('active');
        document.getElementById('subjectRow').querySelector('.scanned-code').textContent = code;
    } else {
        hardenerSerial = code;
        document.getElementById('hardenerRow').classList.add('active');
        document.getElementById('hardenerRow').querySelector('.scanned-code').textContent = code;
    }
    closeCam(); showToast("스캔 성공");
});

function closeCam() { Quagga.stop(); document.getElementById('camModal').classList.add('hidden'); }

function submitEntry() {
    const sNum = document.getElementById('subjectNum').value.trim();
    const hNum = document.getElementById('hardenerNum').value.trim();
    if (!(subjectSerial || sNum) || !(hardenerSerial || hNum)) return showToast("정보를 입력하세요.");

    entries.push({
        id: Date.now(), num: entries.length + 1, dt: document.getElementById('clockEl').textContent,
        manager: document.getElementById('managerInput').value,
        ss: subjectSerial, sn: sNum, hs: hardenerSerial, hn: hNum,
        sr: document.getElementById('sliderSubject').value, hr: document.getElementById('sliderHardener').value
    });
    localStorage.setItem('sr_entries', JSON.stringify(entries));
    // 초기화
    subjectSerial = ''; hardenerSerial = '';
    document.querySelectorAll('.scanned-row').forEach(r => { r.classList.remove('active'); r.querySelector('.scanned-code').textContent="시리얼 스캔 전"; });
    document.getElementById('subjectNum').value = ''; document.getElementById('hardenerNum').value = '';
    showToast("등록 완료");
}

function renderList() {
    const body = document.getElementById('listBody');
    const q = document.getElementById('searchBox').value.toLowerCase();
    // 순차적(1번이 위로) 출력: reverse() 제거
    const filtered = entries.filter(e => (e.ss+e.sn+e.hs+e.hn+e.manager).toLowerCase().includes(q));
    body.innerHTML = filtered.map(e => `
        <div class="list-card">
            <div style="display:flex; justify-content:space-between; font-size:11px; color:#666; margin-bottom:5px;">
                <b>No.${e.num}</b> <span>${e.dt}</span>
            </div>
            <div style="font-size:13px;">주제: ${e.ss || '스캔없음'} ${e.sn?'(#'+e.sn+')':''}</div>
            <div style="font-size:13px;">경화: ${e.hs || '스캔없음'} ${e.hn?'(#'+e.hn+')':''}</div>
            <div style="font-size:12px; margin-top:4px; color:var(--primary); font-weight:700;">비율 ${e.sr}:${e.hr} | ${e.manager || '미입력'}</div>
        </div>
    `).join('');
}

function sendEmail() {
    if(entries.length === 0) return showToast("데이터가 없습니다.");
    let body = "No,날짜,담당자,주제시리얼,주제넘버,경화제시리얼,경화제넘버,비율\n";
    entries.forEach(e => {
        body += `${e.num},${e.dt},${e.manager},${e.ss},${e.sn},${e.hs},${e.hn},${e.sr}:${e.hr}\n`;
    });
    const mailto = `mailto:?subject=시리얼_데이터_보고&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function clearAll() { if(confirm("데이터를 모두 삭제할까요?")) { entries=[]; localStorage.removeItem('sr_entries'); renderList(); } }

async function syncAll() { showToast("기능 준비중"); }
</script>
</body>
</html>
