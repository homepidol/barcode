/* 하단 네비 */

.input-label { background:#dde8f0; width:72px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#0f3d55; border-right:1px solid #c0d4e4; flex-shrink:0; }
.input-field { flex:1; border:none; padding:10px 12px; font-size:14px; color:#0d2d3f; outline:none; background:#ffffff; min-width:0; }
.input-field::placeholder { color:#cccccc; font-size:13px; }
.input-field:focus { background:#f0f8ff; border-left:2px solid #1a5a7a; }

<script>
var entries = [];
try { entries = JSON.parse(localStorage.getItem('sr_v21') || '[]'); } catch(e) { entries = []; }
var camTarget = '';
var currentStream = null;
var pendingData = null;
var toastTmr;

document.addEventListener('DOMContentLoaded', function() {
  clock();
  setInterval(clock, 20000);
  updateRatio('s', 100);
  updateRatio('h', 100);
  renderList();
  updateBadge();
  document.getElementById('mgr-inp').value  = localStorage.getItem('sr_last_mgr')  || '';
  document.getElementById('ship-inp').value = localStorage.getItem('sr_last_ship') || '';
  document.getElementById('gas-url').value  = localStorage.getItem('sr_gasUrl')    || '';
});

function clock() {
  var d = new Date();
  document.getElementById('clock-el').textContent =
    d.getFullYear() + '.' +
    String(d.getMonth()+1).padStart(2,'0') + '.' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0');
}

function goTab(tab, btn) {
  document.querySelectorAll('.tab-page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('pg-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'list') renderList();
}

function updateRatio(type, val) {
  if (type === 's') {
    document.getElementById('val-s').textContent = val + '%';
    document.getElementById('sl-s').style.background = 'linear-gradient(to right,#1a5a7a 0%,#1a5a7a ' + val + '%,#dde8f0 ' + val + '%,#dde8f0 100%)';
  } else {
    document.getElementById('val-h').textContent = val + '%';
    document.getElementById('sl-h').style.background = 'linear-gradient(to right,#27ae6e 0%,#27ae6e ' + val + '%,#dde8f0 ' + val + '%,#dde8f0 100%)';
  }
}

function extractQRData(raw) {
  var lot = '';
  var expDate = '';
  var em = raw.match(/[Ee]xpir[a-z]*\s*[Dd]ate\s*[:\-]?\s*(\d{4}[-\.\/]\d{2}[-\.\/]\d{2})/);
  if (em) {
    expDate = em[1].replace(/[-\.\/]/g, '');
  } else {
    var da = raw.match(/(20\d{2}[-\.\/]\d{2}[-\.\/]\d{2})/g);
    if (da && da.length > 0) { da.sort(); expDate = da[da.length-1].replace(/[-\.\/]/g, ''); }
  }
  var lm = raw.match(/[Ll]ot\s*[Nn]o\.?\s*[:\s]*([A-Za-z0-9][\w\s\-]+)/);
  if (lm) {
    lot = lm[1].trim().replace(/[A-Za-z\s]/g, '').replace(/^-+|-+$/g, '');
  } else {
    var lm2 = raw.match(/(\d{4,}[\-\d]+)/);
    if (lm2) lot = lm2[1];
  }
  var res = [];
  if (lot) res.push(lot);
  if (expDate) res.push(expDate);
  if (res.length > 0) return res.join(' / ');
  return raw.replace(/[A-Za-z]/g, '').trim();
}

function openCam(target) {
  camTarget = target;
  document.getElementById('cam-wrap').style.display = 'flex';
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(function(stream) {
      currentStream = stream;
      document.getElementById('cam-video').srcObject = stream;
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
      var reader = new ZXing.BrowserMultiFormatReader(hints);
      reader.decodeFromStream(stream, 'cam-video', function(result, err) {
        if (result) {
          if (navigator.vibrate) navigator.vibrate(80);
          var fieldId = (camTarget === 'subject') ? 's-serial' : 'h-serial';
          document.getElementById(fieldId).value = extractQRData(result.getText());
          reader.reset();
          closeCam();
          toast('QR 스캔 완료!');
        }
      });
    })
    .catch(function() { toast('카메라 권한을 확인해주세요.'); closeCam(); });
}

function closeCam() {
  if (currentStream) { currentStream.getTracks().forEach(function(t) { t.stop(); }); currentStream = null; }
  document.getElementById('cam-video').srcObject = null;
  document.getElementById('cam-wrap').style.display = 'none';
}

function doSubmit() {
  var ss = document.getElementById('s-serial').value.trim();
  var sn = document.getElementById('s-num').value.trim();
  var hs = document.getElementById('h-serial').value.trim();
  var hn = document.getElementById('h-num').value.trim();
  var sub = ss || sn;
  var har = hs || hn;
  if (!sub || !har) { toast('주제와 경화제 정보를 모두 입력해주세요.'); return; }
  var dupS = entries.some(function(e) { return e.sub === sub; });
  var dupH = entries.some(function(e) { return e.har === har; });
  pendingData = { sub: sub, har: har };
  if (dupS || dupH) { document.getElementById('confirm-modal').style.display = 'flex'; }
  else { forceSubmit(); }
}

function closeConfirm() {
  document.getElementById('confirm-modal').style.display = 'none';
  pendingData = null;
}

function forceSubmit() {
  if (!pendingData) return;
  document.getElementById('confirm-modal').style.display = 'none';
  var mgr  = document.getElementById('mgr-inp').value.trim();
  var ship = document.getElementById('ship-inp').value.trim();
  localStorage.setItem('sr_last_mgr', mgr);
  localStorage.setItem('sr_last_ship', ship);
  var entry = {
    id: Date.now(), num: entries.length + 1,
    dt: document.getElementById('clock-el').textContent,
    ship: ship, mgr: mgr,
    qty:  document.getElementById('qty-total').value.trim(),
    remS: document.getElementById('s-rem').value.trim(),
    remH: document.getElementById('h-rem').value.trim(),
    sub:  pendingData.sub, har: pendingData.har,
    sr:   document.getElementById('sl-s').value,
    hr:   document.getElementById('sl-h').value,
    note: document.getElementById('note-inp').value.trim()
  };
  entries.push(entry);
  localStorage.setItem('sr_v21', JSON.stringify(entries));
  ['s-serial','s-num','s-rem','h-serial','h-num','h-rem','qty-total','note-inp'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  pendingData = null;
  updateBadge(); renderList();
  toast('No.' + entry.num + ' 등록 완료');
}

function renderList() {
  var el = document.getElementById('list-body');
  var q  = (document.getElementById('list-search') ? document.getElementById('list-search').value : '').toLowerCase();
  var fl = entries.filter(function(e) {
    return ((e.sub||'') + (e.har||'') + (e.mgr||'') + (e.ship||'') + (e.note||'')).toLowerCase().indexOf(q) !== -1;
  });
  if (!fl.length) {
    el.innerHTML = '<div style="text-align:center;padding:50px 20px;color:#999999;font-size:14px;">저장된 데이터가 없습니다.</div>';
    return;
  }
  el.innerHTML = fl.map(function(e) {
    return '<div class="list-card">'
      + (e.ship ? '<div class="tag-ship">' + e.ship + '</div>' : '')
      + '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:#666666;">'
      +   '<span><b>No.' + e.num + '</b> | ' + e.dt + '</span>'
      +   '<button onclick="delE(' + e.id + ')" style="border:none;background:none;font-size:20px;color:#999999;cursor:pointer;">&#215;</button>'
      + '</div>'
      + '<div style="font-size:14px;margin-bottom:4px;">주제: <b style="color:#0d2d3f;">' + e.sub + '</b></div>'
      + '<div style="font-size:14px;">경화: <b style="color:#0d2d3f;">' + e.har + '</b></div>'
      + '<div class="data-row">'
      +   '<span>물량: <b style="color:#1a5a7a;">' + (e.qty||0) + '</b></span>'
      +   '<span>잔여: S <b style="color:#27ae6e;">' + (e.remS||0) + '</b> / H <b style="color:#27ae6e;">' + (e.remH||0) + '</b></span>'
      + '</div>'
      + '<div style="margin-top:8px;font-size:12px;color:#1a5a7a;font-weight:700;">비율 S ' + e.sr + '% : H ' + e.hr + '% | ' + (e.mgr||'담당자 미상') + '</div>'
      + (e.note ? '<div style="font-size:12px;color:#666666;background:#f4f4f4;padding:6px 8px;border-radius:6px;margin-top:8px;">&#128204; ' + e.note + '</div>' : '')
      + '</div>';
  }).join('');
}

function delE(id) {
  entries = entries.filter(function(e) { return e.id !== id; });
  entries.forEach(function(e, i) { e.num = i + 1; });
  localStorage.setItem('sr_v21', JSON.stringify(entries));
  updateBadge(); renderList();
}

function clearAll() {
  if (confirm('전체 삭제하시겠습니까?')) {
    entries = []; localStorage.removeItem('sr_v21');
    updateBadge(); renderList();
  }
}

function updateBadge() {
  var b = document.getElementById('badge');
  if (entries.length > 0) { b.style.display = 'flex'; b.textContent = entries.length; }
  else { b.style.display = 'none'; }
}

function saveSettings() {
  localStorage.setItem('sr_gasUrl', document.getElementById('gas-url').value.trim());
  toast('설정이 저장되었습니다.');
}

function doExcel() {
  if (!entries.length) { toast('데이터가 없습니다.'); return; }
  var hd = ['번호','날짜','호선/블록','담당자','물량','주제데이터','주제잔여(kg)','경화제데이터','경화제잔여(kg)','주제비율(%)','경화제비율(%)','비고'];
  var ws = [hd];
  entries.forEach(function(e) { ws.push([e.num,e.dt,e.ship,e.mgr,e.qty,e.sub,e.remS,e.har,e.remH,e.sr,e.hr,e.note||'']); });
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws), 'Data');
  XLSX.writeFile(wb, '현장기록_' + Date.now() + '.xlsx');
}

function doExportCSV() {
  if (!entries.length) { toast('데이터가 없습니다.'); return; }
  var hd = ['번호','날짜','호선/블록','담당자','물량','주제데이터','주제잔여(kg)','경화제데이터','경화제잔여(kg)','주제비율(%)','경화제비율(%)','비고'];
  var rows = entries.map(function(e) { return [e.num,e.dt,e.ship,e.mgr,e.qty,e.sub,e.remS,e.har,e.remH,e.sr,e.hr,e.note||'']; });
  var csv = [hd].concat(rows).map(function(r) {
    return r.map(function(v) { return '"' + String(v||'').replace(/"/g,'""') + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '현장기록_' + Date.now() + '.csv';
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSV 저장 완료!');
}

function doExportJSON() {
  if (!entries.length) { toast('데이터가 없습니다.'); return; }
  var blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '현장기록_백업_' + Date.now() + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('JSON 백업 완료!');
}

function doImportJSON() {
  var fi = document.getElementById('json-file-input');
  fi.value = ''; fi.click();
}

function handleJSONImport(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp)) throw new Error('형식 오류');
      if (confirm(imp.length + '개 항목\n[확인] 기존에 추가  /  [취소] 덮어쓰기')) {
        var ids = {};
        entries.forEach(function(e) { ids[e.id] = true; });
        entries = entries.concat(imp.filter(function(e) { return !ids[e.id]; }));
        entries.forEach(function(e, i) { e.num = i + 1; });
      } else {
        entries = imp;
      }
      localStorage.setItem('sr_v21', JSON.stringify(entries));
      updateBadge(); renderList();
      toast(entries.length + '개 복원 완료');
    } catch(err) { toast('올바른 JSON 파일이 아닙니다.'); }
  };
  reader.readAsText(file);
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function() { t.classList.remove('on'); }, 2500);
}
</script>
