<style>
/* 입력창 가시성 보강을 위한 추가 스타일 */
.num-row { background: #fff; }
.num-inp { 
    background: #f8fafc; /* 수동 입력창임을 알 수 있게 배경색 추가 */
    border-left: 2px solid var(--primary-lt) !important; 
}
.num-inp:focus { 
    background: #fff; 
    border-color: var(--primary);
}
/* 스캔 전/후 상태 구분 강화 */
.scanned-row { background: #fafafa; }
.scanned-row.on { background: #f0f9ff; }
</style>

<div class="sec-card">
          <div class="sec-hdr">
            <div class="sec-lbl">주제</div>
            <button class="sec-scan-btn" onclick="openCam('subject')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              바코드 스캔
            </button>
          </div>
          <div class="scanned-row" id="subjectRow">
            <div class="s-dot"></div>
            <div class="s-code" id="sCodeDisplay">바코드 스캔 대기 중...</div>
          </div>
          <div class="num-row">
            <div class="num-lbl">넘버</div>
            <input class="num-inp" id="subjectNum" type="text" inputmode="numeric" placeholder="스캔 안될 시 여기에 넘버 입력">
          </div>
        </div>

        <div class="sec-card">
          <div class="sec-hdr">
            <div class="sec-lbl">경화제</div>
            <button class="sec-scan-btn" onclick="openCam('hardener')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              바코드 스캔
            </button>
          </div>
          <div class="scanned-row" id="hardenerRow">
            <div class="s-dot"></div>
            <div class="s-code" id="hCodeDisplay">바코드 스캔 대기 중...</div>
          </div>
          <div class="num-row">
            <div class="num-lbl">넘버</div>
            <input class="num-inp" id="hardenerNum" type="text" inputmode="numeric" placeholder="스캔 안될 시 여기에 넘버 입력">
          </div>
        </div>

<script>
function submitEntry() {
  const sNum = document.getElementById('subjectNum').value.trim();
  const hNum = document.getElementById('hardenerNum').value.trim();
  const mgr = document.getElementById('mgrInput').value.trim();

  // 바코드(subjectSerial)가 없더라도 sNum(넘버)이 있으면 인정
  const isSubjectOk = (subjectSerial !== '' || sNum !== '');
  const isHardenerOk = (hardenerSerial !== '' || hNum !== '');

  if (!isSubjectOk || !isHardenerOk) {
    showToast('주제와 경화제의 [스캔] 또는 [넘버 입력]이 필요합니다.');
    return;
  }

  const n = new Date();
  const dt = n.getFullYear()+'.'+(n.getMonth()+1)+'.'+n.getDate()+' '+pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  const sVal = parseInt(document.getElementById('sliderS').value);

  const entry = {
    id: Date.now(),
    num: entries.length + 1,
    dt: dt,
    manager: mgr,
    ss: subjectSerial, // 스캔 데이터 (없을 수 있음)
    sn: sNum,          // 수동 입력 데이터 (없을 수 있음)
    hs: hardenerSerial,
    hn: hNum,
    sr: sVal,
    hr: 100 - sVal,
    synced: false
  };

  entries.push(entry);
  localStorage.setItem('sr_v2_entries', JSON.stringify(entries));

  // 입력 필드 및 스캔 상태 초기화
  subjectSerial = ''; hardenerSerial = '';
  document.getElementById('subjectRow').className = 'scanned-row';
  document.getElementById('sCodeDisplay').textContent = '바코드 스캔 대기 중...';
  document.getElementById('hardenerRow').className = 'scanned-row';
  document.getElementById('hCodeDisplay').textContent = '바코드 스캔 대기 중...';
  document.getElementById('subjectNum').value = '';
  document.getElementById('hardenerNum').value = '';

  updateBadge(); renderPreview(); renderList();
  showToast('✓ ' + entry.num + '번 데이터가 등록되었습니다.');

  if (gasUrl) syncOne(entry);
}

// 목록 렌더링 (순차적으로 1번부터 나오게)
function renderList() {
  const q = (document.getElementById('searchBox') ? document.getElementById('searchBox').value : '').toLowerCase();
  // reverse()를 사용하지 않아 1번(배열의 0번째)이 가장 먼저 나옵니다.
  const filtered = q ? entries.filter(e => 
    ((e.ss||'')+(e.sn||'')+(e.hs||'')+(e.hn||'')+(e.manager||'')).toLowerCase().includes(q)
  ) : entries;

  const el = document.getElementById('listBody');
  if (!filtered.length) {
    el.innerHTML = '<div class="list-empty">데이터가 없습니다.</div>';
    return;
  }

  el.innerHTML = filtered.map(e => `
    <div class="list-card">
      <div class="lc-top">
        <span class="lc-num">No.${e.num}</span>
        <span class="lc-time">${e.dt}</span>
        <button class="lc-del" onclick="delEntry(${e.id})">×</button>
      </div>
      <div class="lc-row">
        <span class="lc-tag">주제</span>
        <span class="lc-val">${e.ss || '(스캔없음)'} ${e.sn ? '<b>#'+e.sn+'</b>' : ''}</span>
      </div>
      <div class="lc-row">
        <span class="lc-tag g">경화제</span>
        <span class="lc-val">${e.hs || '(스캔없음)'} ${e.hn ? '<b>#'+e.hn+'</b>' : ''}</span>
      </div>
      <div class="lc-row">
        <span class="lc-ratio">비율 ${e.sr}:${e.hr}</span>
        <span class="lc-mgr">${e.manager ? '👤 '+e.manager : ''}</span>
        <div class="sync-dot ${e.synced ? 'ok' : 'pend'}"></div>
      </div>
    </div>
  `).join('');
}
</script>
