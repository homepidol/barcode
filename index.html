@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root {
  --bg: #eef2f6; --p: #1a5a7a; --dk: #0f3d55; --lt: #2478a0;
  --gn: #27ae6e; --wh: #ffffff; --cd: #dde8f0; --bd: #c0d4e4;
  --tx: #0d2d3f; --mt: #7a9aaa;
  --st: env(safe-area-inset-top, 0px); --sb: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {

}

#app { display:flex; flex-direction:column; width:100%; height:100%; padding-top:var(--st); padding-bottom:var(--sb); }
#pages { flex:1; overflow:hidden; position:relative; }
.tab-page { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; flex-direction:column; }
.tab-page.active { display:flex; }

/* ── 하단 네비 ── */
#nav { display:flex; flex-shrink:0; background:var(--dk); border-top:2px solid var(--p); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0; background:none; border:none; color:rgba(255,255,255,0.4); font-weight:700; cursor:pointer; }
.nav-item.active { color:#fff; border-top:3px solid #fff; margin-top:-2px; }
.badge { position:absolute; top:5px; right:calc(50% - 22px); background:#e74c3c; color:#fff; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; }

/* ════════ PAGE 1 — 입력 ════════ */
.scroll-wrap { flex:1; padding:14px; display:flex; flex-direction:column; gap:14px; }
.top-bar { display:flex; align-items:center; gap:10px; background:var(--wh); border:1px solid var(--bd); border-radius:12px; padding:10px 14px; }
.clock { font-size:13px; color:var(--mt); font-weight:500; white-space:nowrap; }
.mgr-inp { flex:1; border:1.5px solid var(--bd); border-radius:8px; background:var(--cd); padding:9px 12px; font-size:15px; color:var(--tx); outline:none; }
.mgr-inp:focus { border-color:var(--p); background:#fff; }

.sec-card { background:var(--wh); border:1px solid var(--bd); border-radius:12px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.sec-head { display:flex; height:50px; }
.sec-name { background:var(--dk); color:#fff; width:80px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
.sec-btn { flex:1; background:var(--p); border:none; color:#fff; font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; }
.sec-btn:active { background:var(--lt); }

/* 단일 수동 입력창 */
.input-row { display:flex; border-top:1px solid var(--bd); background:#fffbe6; }
.input-field { flex:1; border:none; padding:15px 14px; font-size:16px; color:var(--tx); outline:none; width:100%; display:block; background:transparent; font-weight:500; }
.input-field:focus { background:#fff; border-left:3px solid var(--p); }
.input-field::placeholder { color:#aaa; font-size:14px; font-weight:400; }

.ratio-card { background:var(--wh); border:1px solid var(--bd); border-radius:12px; padding:14px; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
.prog-bar { display:flex; height:44px; border-radius:22px; overflow:hidden; background:#eee; margin-bottom:12px; }
.prog-s { background:linear-gradient(90deg, #0f3d55, #1a5a7a); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; transition:0.3s; }
.prog-h { background:linear-gradient(90deg, #1e8a58, #27ae6e); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; transition:0.3s; }
input[type=range] { -webkit-appearance:none; width:100%; height:12px; border-radius:6px; background:var(--cd); margin:10px 0; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:30px; height:30px; border-radius:50%; background:var(--p); border:4px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,0.3); }

.reg-btn { width:100%; padding:18px; background:var(--dk); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:700; cursor:pointer; box-shadow:0 4px 15px rgba(15,61,85,0.3); }
.reg-btn:active { transform:scale(0.98); background:var(--p); }

/* ════════ PAGE 2 — 목록 ════════ */
.list-tool { display:flex; gap:8px; padding:10px; background:var(--dk); }
.list-search { flex:1; padding:10px; border-radius:8px; border:none; outline:none; font-size:14px; }
